/**
 * Sub-Store 修复版：统一重命名 BPB 节点为 ⭐Xintour
 * 解决了可能导致 500 错误的变量引用和数组操作问题
 */

function operator(proxies) {
  // 获取参数，增加兼容性处理
  const arguments_ = (typeof $arguments !== 'undefined') ? $arguments : {};
  const FGF = arguments_.fgf ? decodeURI(arguments_.fgf) : " ";
  const XHFGF = arguments_.sn ? decodeURI(arguments_.sn) : " ";
  const numone = arguments_.one || false;

  const processedProxies = proxies.map((e) => {
    // 1. 自动修复 Reality 参数报错
    if (e.type === 'vless' && e['reality-opts']) {
      let sid = e['reality-opts']['short-id'] || "";
      if (sid !== "" && (sid.length % 2 !== 0 || !/^[0-9a-fA-F]+$/.test(sid))) {
        e['reality-opts']['short-id'] = ""; 
      }
    }

    const originalName = e.name || "";
    const isSpecial = /BPB|💦/i.test(originalName);
    
    // 2. 标签提取
    let tags = [];
    const speed = originalName.match(/[\d.]+(MB\/s|KB\/s|Gbps|Mbps)/i);
    if (speed) tags.push(speed[0]);
    if (/GPT/i.test(originalName)) tags.push("GPT⁺");
    if (/NF|Netflix/i.test(originalName)) tags.push("NF");
    if (/YT|YouTube/i.test(originalName)) tags.push("YT");
    
    let tempTag = tags.length > 0 ? `[${tags.join("|")}]` : "";

    // 3. 重命名逻辑：包含特殊字符则命名为 ⭐Xintour，否则清理原名
    if (isSpecial) {
      e.name = "⭐Xintour";
    } else {
      e.name = originalName.replace(/\[.*?\]/g, "").trim(); 
    }
    
    // 临时存储标签，稍后拼接
    e._tempTag = tempTag;
    return e;
  });

  // 4. 序号处理 (使用更稳健的重命名逻辑)
  const nameGroups = {};
  processedProxies.forEach(proxy => {
    const baseName = proxy.name;
    if (!nameGroups[baseName]) nameGroups[baseName] = [];
    nameGroups[baseName].push(proxy);
  });

  const finalProxies = [];
  Object.keys(nameGroups).forEach(baseName => {
    const group = nameGroups[baseName];
    group.forEach((proxy, index) => {
      // 拼接序号和标签
      const suffix = group.length > 1 ? `${XHFGF}${(index + 1).toString().padStart(2, "0")}` : "";
      proxy.name = `${proxy.name}${suffix}${proxy._tempTag ? FGF + proxy._tempTag : ""}`;
      delete proxy._tempTag;
      finalProxies.push(proxy);
    });
  });

  // 排序：⭐Xintour 排在最后
  return finalProxies.sort((a, b) => {
    const aSpec = a.name.includes('⭐Xintour');
    const bSpec = b.name.includes('⭐Xintour');
    return aSpec - bSpec;
  });
}

# 代理组配置
proxy-groups:
  # 🚀 节点选择: 手动选择节点或策略
  - name: 节点选择
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    type: select
    proxies:
      - DIRECT
      - 自动选择
      - 手动切换

  # 🚀 手动切换: 具体节点的列表
  - name: 手动切换
    icon: https://cdn.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png
    type: select
    include-all: true

  # ♻️ 自动选择: 根据延迟自动选择最优节点
  - name: 自动选择
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
    type: url-test
    url: http://www.gstatic.com/generate_204
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true

  # 🌐 国际流量: 处理未命中的国际网站流量
  - name: 国际流量
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 手动切换

  # 🎯 国内流量: 处理已知国内网站的直连或代理策略
  - name: 国内流量
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/CN.png
    type: select
    proxies:
      - DIRECT
      - 节点选择

  # 🚫 国内广告: 拦截国内应用内的广告
  - name: 国内广告
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AdBlack.png
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 节点选择

  # 🚫 国外广告: 拦截国外应用或网页广告
  - name: 国外广告
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AdBlack.png
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 节点选择

  # 🤖 AI服务: 针对 ChatGPT, Claude, Gemini 等 AI 服务的策略
  - name: AI服务
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AI.png
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 手动切换

  # 📹 YouTube: YouTube 专用优化策略
  - name: YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 手动切换

  # Ⓜ️ 微软服务: 微软 Office, Outlook, OneDrive 等服务策略
  - name: 微软服务
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/OneDrive.png
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 手动切换

  # 🔍 谷歌服务: Google 搜索、地图及其他非 YouTube 谷歌服务
  - name: 谷歌服务
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google.png
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 手动切换

  # 📧 Google FCM: 谷歌推送通知服务策略
  - name: Google FCM
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 手动切换

  # 🍎 Apple服务: App Store, iCloud, Apple Music 等苹果服务
  - name: Apple服务
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 手动切换

  # 🌍 国外媒体: 其他未分类的国际视频/音乐流媒体
  - name: 国外媒体
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ForeignMedia.png
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 手动切换
      - DIRECT

  # ✈️ Telegram: Telegram 聊天应用专用策略
  - name: Telegram
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 手动切换

  # Ⓜ️ Microsoft: 微软综合服务策略
  - name: Microsoft
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Copilot.png
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 自动选择
      - 手动切换

  # 🫧 WeChat: 微信特殊处理(通常建议直连)
  - name: WeChat
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/WeChat.png
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 手动切换

